<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CyberShield</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="bg-overlay"></div>
    <div class="scan-line"></div>
    <div class="container" style="max-width: 450px; padding: 1rem;">
        <div class="card fade-in">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="logo" style="font-size: 2.2rem; margin-bottom: 0.5rem;">CYBERSHIELD</div>
                <p style="color: var(--text-secondary); font-family: var(--font-heading); letter-spacing: 2px;">PORTAL AUTHENTICATION</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="submit" style="width: 100%; margin-top: 1rem; background: var(--primary); color: #000; border: none;">SIGN IN</button>
                <p id="loginMsg" style="text-align: center; margin-top: 1.5rem; color: var(--status-pending); font-size: 0.9rem; font-weight: 600;"></p>
            </form>

            <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
