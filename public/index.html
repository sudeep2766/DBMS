<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield | Secure Reporting</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="scan-line"></div>
    <header>
        <div class="container">
            <nav>
                <div class="logo">CYBERSHIELD</div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="login.html">Login</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero fade-in">
            <h1 data-text="Report Cyber Crime">Report Cyber Crime</h1>
            <p style="font-size: 1.2rem; opacity: 0.7;">REGISTER SECURE INCIDENTS INTO THE ENCRYPTED THREAT DATABASE</p>
        </section>

        <section class="fade-in" style="animation-delay: 0.2s;">
            <div class="card">
                <h2>INCIDENT REGISTRATION</h2>
                <form id="complaintForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="example@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="mobile">Mobile Number</label>
                            <input type="tel" id="mobile" placeholder="+91 XXXXX XXXXX" required>
                        </div>
                        <div class="form-group">
                            <label for="region">Incident Region</label>
                            <select id="region" required>
                                <option value="" disabled selected>Select State</option>
                                <option value="Andhra Pradesh">Andhra Pradesh</option>
                                <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                <option value="Assam">Assam</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Chhattisgarh">Chhattisgarh</option>
                                <option value="Goa">Goa</option>
                                <option value="Gujarat">Gujarat</option>
                                <option value="Haryana">Haryana</option>
                                <option value="Himachal Pradesh">Himachal Pradesh</option>
                                <option value="Jharkhand">Jharkhand</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Kerala">Kerala</option>
                                <option value="Madhya Pradesh">Madhya Pradesh</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Manipur">Manipur</option>
                                <option value="Meghalaya">Meghalaya</option>
                                <option value="Mizoram">Mizoram</option>
                                <option value="Nagaland">Nagaland</option>
                                <option value="Odisha">Odisha</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Sikkim">Sikkim</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Telangana">Telangana</option>
                                <option value="Tripura">Tripura</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="Uttarakhand">Uttarakhand</option>
                                <option value="West Bengal">West Bengal</option>
                                <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                                <option value="Chandigarh">Chandigarh</option>
                                <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                                <option value="Ladakh">Ladakh</option>
                                <option value="Lakshadweep">Lakshadweep</option>
                                <option value="Puducherry">Puducherry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="incident_date">Date of Incident</label>
                            <input type="date" id="incident_date" required>
                        </div>
                        <div class="form-group">
                            <label for="type">Crime Type</label>
                            <select id="type" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="Phishing">Phishing</option>
                                <option value="Identity Theft">Identity Theft</option>
                                <option value="Cyber Bullying">Cyber Bullying</option>
                                <option value="Financial Fraud">Financial Fraud</option>
                                <option value="Hacking">Hacking</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="platform">Platform (Optional)</label>
                            <input type="text" id="platform" placeholder="e.g., Facebook, WhatsApp, Email">
                        </div>
                        <div class="form-group">
                            <label for="suspect_info">Suspect Info (Optional)</label>
                            <input type="text" id="suspect_info" placeholder="Any known details about the suspect">
                        </div>
                        <div class="form-group full-width">
                            <label for="description">Detailed Description</label>
                            <textarea id="description" rows="4" placeholder="Describe the incident in detail..." required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="evidence">Evidence Attachment (Optional)</label>
                            <input type="file" id="evidence" style="padding: 0.8rem;">
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 2rem;">
                        <button type="submit">SUBMIT</button>
                    </div>
                    <p id="responseMsg" style="text-align: center; margin-top: 1rem; font-weight: 600;"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
